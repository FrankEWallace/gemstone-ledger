name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-type-build:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

# NOTE: Database migrations are applied through the Supabase tooling (MCP /
# CLI) directly against the project, not from CI. A previous "Supabase DB
# Push" job was removed because the local migration files use short numeric
# prefixes (001_, 024_) while the remote migration history records them under
# 14-digit timestamp versions, so `supabase db push` could not reconcile the
# two and would attempt to re-apply 001_initial_schema onto the live DB.
