name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-type-build:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      # No secrets needed: the covered flows (auth screens, demo mode) are
      # fully client-side; the config falls back to placeholder Supabase env.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

# NOTE: Database migrations are applied through the Supabase tooling (MCP /
# CLI) directly against the project, not from CI. A previous "Supabase DB
# Push" job was removed because the local migration files use short numeric
# prefixes (001_, 024_) while the remote migration history records them under
# 14-digit timestamp versions, so `supabase db push` could not reconcile the
# two and would attempt to re-apply 001_initial_schema onto the live DB.
